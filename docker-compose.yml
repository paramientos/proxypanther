services:
  caddy:
    image: proxypanther-caddy:local
    container_name: proxypanther_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"
    environment:
      - CADDY_ADMIN=0.0.0.0:2019
    volumes:
      - caddy_config:/etc/caddy
      - caddy_data:/data/caddy
      - caddy_logs:/var/log/caddy
    networks:
      - proxypanther

  app:
    image: ghcr.io/paramientos/proxypanther-app:${TAG:-latest}
    container_name: proxypanther_app
    restart: unless-stopped
    ports:
      - "3434:8000"
    env_file:
      - .env.docker
    environment:
      - CONTAINER_ROLE=app
    volumes:
      - app_storage:/var/www/html/storage
      - caddy_config:/etc/caddy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      caddy:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/up"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - proxypanther

  horizon:
    image: ghcr.io/paramientos/proxypanther-app:${TAG:-latest}
    container_name: proxypanther_horizon
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      - CONTAINER_ROLE=horizon
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_healthy
    networks:
      - proxypanther

  scheduler:
    image: ghcr.io/paramientos/proxypanther-app:${TAG:-latest}
    container_name: proxypanther_scheduler
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      - CONTAINER_ROLE=scheduler
    volumes:
      - app_storage:/var/www/html/storage
      - caddy_config:/etc/caddy
    depends_on:
      app:
        condition: service_healthy
    networks:
      - proxypanther

  reverb:
    image: ghcr.io/paramientos/proxypanther-app:${TAG:-latest}
    container_name: proxypanther_reverb
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      - CONTAINER_ROLE=reverb
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_healthy
    networks:
      - proxypanther

  postgres:
    image: postgres:16-alpine
    container_name: proxypanther_postgres
    restart: unless-stopped
    ports:
      - "5656:5432"
    env_file:
      - .env.docker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proxypanther -d proxypanther"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - proxypanther

  redis:
    image: redis:7-alpine
    container_name: proxypanther_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - proxypanther

volumes:
  postgres_data:
  redis_data:
  app_storage:
  caddy_config:
  caddy_data:
  caddy_logs:

networks:
  proxypanther:
    driver: bridge
