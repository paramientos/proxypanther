services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: proxypanther_app
    restart: unless-stopped
    ports:
      - "3434:8000"
    environment:
      APP_ENV: production
      APP_DEBUG: false
      OCTANE_SERVER: roadrunner
    env_file:
      - .env.docker
    volumes:
      - app_storage:/var/www/html/storage
      - caddy_logs:/var/www/html/storage/logs/caddy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - proxypanther

  horizon:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: proxypanther_horizon
    restart: unless-stopped
    command: ["php", "artisan", "horizon"]
    env_file:
      - .env.docker
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - proxypanther

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: proxypanther_scheduler
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    env_file:
      - .env.docker
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - proxypanther

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: proxypanther_reverb
    restart: unless-stopped
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    env_file:
      - .env.docker
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - proxypanther

  postgres:
    image: postgres:16-alpine
    container_name: proxypanther_postgres
    restart: unless-stopped
    ports:
      - "5656:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-proxypanther}
      POSTGRES_USER: ${DB_USERNAME:-proxypanther}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-proxypanther} -d ${DB_DATABASE:-proxypanther}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - proxypanther

  redis:
    image: redis:7-alpine
    container_name: proxypanther_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - proxypanther

volumes:
  postgres_data:
  redis_data:
  app_storage:
  caddy_logs:

networks:
  proxypanther:
    driver: bridge
